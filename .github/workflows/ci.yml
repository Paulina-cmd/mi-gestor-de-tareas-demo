name: CI de Tareas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Ejecutar Tests
        run: |
          # Aquí pondrías tus comandos de test, por ejemplo:
          python -m unittest discover tests